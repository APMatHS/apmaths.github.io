<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
{% if page.title %}
{{ page.title }} | {{ include.t.site.title }}
{% else %}
{{ include.t.site.title }}
{% endif %}
</title>

<meta name="description"
      content="{{ page.description | default: site.description }}">

<meta name="author"
      content="{{ site.author.name | default: site.author }}">

<meta name="robots"
      content="index,follow">

<meta name="theme-color"
      content="#1e3a8a">

<link rel="canonical"
      href="{{ page.url | absolute_url }}">

<!-- ===================== -->
<!-- Open Graph            -->
<!-- ===================== -->

<meta property="og:type" content="website">

<meta property="og:title"
      content="{{ page.title | default: site.title }}">

<meta property="og:description"
      content="{{ page.description | default: site.description }}">

<meta property="og:url"
      content="{{ page.url | absolute_url }}">

<meta property="og:site_name"
      content="{{ site.title }}">

<meta property="og:image"
      content="{{ '/assets/images/logo/og-image.jpg' | absolute_url }}">

<!-- ===================== -->
<!-- Twitter Card          -->
<!-- ===================== -->

<meta name="twitter:card"
      content="summary_large_image">

<meta name="twitter:title"
      content="{{ page.title | default: site.title }}">

<meta name="twitter:description"
      content="{{ page.description | default: site.description }}">

<meta name="twitter:image"
      content="{{ '/assets/images/logo/og-image.jpg' | absolute_url }}">

<!-- ===================== -->
<!-- Favicon               -->
<!-- ===================== -->

<link rel="icon"
      href="/assets/images/favicon.ico">

<!-- ===================== -->
<!-- CSS                   -->
<!-- ===================== -->

<link rel="stylesheet"
      href="/css/style.css">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- ===================== -->
<!-- MathJax               -->
<!-- ===================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-polyfills/0.1.43/polyfill.min.js"></script>

<script id="MathJax-script"
        async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- ===================== -->
<!-- Google Analytics       -->
<!-- Adsense               -->
<!-- ===================== -->

{% include google.html %}

<!-- ===================== -->
<!-- Facebook SDK          -->
<!-- ===================== -->

<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/vi_VN/sdk.js#xfbml=1&version=v18.0&appId=3686401291644500">
</script>

</head>
