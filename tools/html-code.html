<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APMaths HTML Editor</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --header-bg: #2c3e50;
            --header-text: #ffffff;
            --btn-bg: #34495e;
            --btn-hover: #415b76;
            --accent: #3498db;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e1e;
            --panel-bg: #1e1e1e;
            --text-color: #d4d4d4;
            --border-color: #3c3c3c;
            --header-bg: #0d1117;
            --header-text: #c9d1d9;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
            --accent: #58a6ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            height: 55px;
            z-index: 10;
        }
        .logo { font-weight: 700; font-size: 1.1rem; min-width: 170px; }
        .logo span { color: var(--accent); }
        .controls { display: flex; gap: 6px; align-items: center; }
        
        button, select {
            background-color: var(--btn-bg);
            color: var(--header-text);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
            outline: none;
        }
        button:hover { background-color: var(--btn-hover); }
        select option { background-color: var(--panel-bg); color: var(--text-color); }
        
        #run-btn { background-color: #27ae60; border-color: #27ae60; font-weight: 600; }
        #run-btn:hover { background-color: #2ecc71; }
        #reset-btn { background-color: #c0392b; border-color: #c0392b; }
        #reset-btn:hover { background-color: #e74c3c; }

        .opt-label { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; cursor: pointer; }
        .addon-group { display: flex; gap: 4px; border-right: 1px solid var(--border-color); padding-right: 6px; }

        .workspace {
            display: flex;
            flex: 1;
            position: relative;
            height: calc(100dvh - 55px);
            overflow: hidden;
        }

        .panel { display: flex; flex-direction: column; background: var(--panel-bg); height: 100%; overflow: hidden; }
        #editor-panel { width: 50%; }
        #preview-panel { width: 50%; }

        .panel-header {
            background-color: var(--bg-color);
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* 5. TRẠNG THÁI LƯU TRỮ */
        .status-indicator { font-size: 0.75rem; transition: color 0.2s; font-weight: normal; text-transform: none; }
        .status-saved { color: #27ae60; }
        .status-unsaved { color: #e67e22; }

        textarea {
            width: 100%;
            flex: 1;
            border: none;
            resize: none;
            outline: none;
            font-family: "Fira Code", Consolas, monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 15px;
            background-color: var(--panel-bg);
            color: var(--text-color);
        }

        iframe { width: 100%; flex: 1; border: none; background: #ffffff; }

        .resizer { width: 6px; background-color: var(--border-color); cursor: col-resize; z-index: 5; touch-action: none; }
        .resizer:hover, .resizer.dragging { background-color: var(--accent); }

        @media (max-width: 900px) {
            header { height: auto; flex-direction: column; gap: 8px; padding: 10px; }
            .workspace { height: calc(100dvh - header.getBoundingClientRect().height); }
            .workspace { flex-direction: column; }
            #editor-panel, #preview-panel { width: 100% !important; height: 50%; }
            .resizer { width: 100%; height: 6px; cursor: row-resize; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">APMaths <span>HTML Editor</span></div>
        <div class="controls">
            <!-- 6. KHO VÍ DỤ NẠP BÀI HỌC (EXAMPLES) -->
            <select id="examples-select" title="Chọn mã ví dụ mẫu">
                <option value="" disabled selected>Chọn ví dụ mẫu ▼</option>
                <option value="html">Cấu trúc HTML5</option>
                <option value="css">CSS Cơ bản</option>
                <option value="flexbox">Bố cục Flexbox</option>
                <option value="canvas">Đồ họa Canvas</option>
                <option value="javascript">Xử lý JavaScript</option>
            </select>

            <div class="addon-group">
                <button id="copy-btn" title="Sao chép toàn bộ mã nguồn">Copy</button>
                <button id="download-btn" title="Tải file HTML về máy (Ctrl+S)">Download</button>
                <button id="reset-btn" title="Khôi phục mã ban đầu">Reset</button>
            </div>
            
            <label class="opt-label"><input type="checkbox" id="autorun-cb" checked> Auto Run</label>
            <button id="theme-btn">🌙 Giao diện</button>
            <button id="run-btn">▶ Run</button>
        </div>
    </header>

    <div class="workspace" id="workspace">
        <div class="panel" id="editor-panel">
            <div class="panel-header">
                <span>Source Code</span>
                <!-- 5. HIỂN THỊ TRẠNG THÁI UX -->
                <span id="status-text" class="status-indicator status-saved">✔ Saved</span>
            </div>
            <textarea id="code-editor" spellcheck="false" placeholder="Nhập mã HTML tại đây..."></textarea>
        </div>

        <div class="resizer" id="drag-bar"></div>

        <div class="panel" id="preview-panel">
            <div class="panel-header">Live Preview</div>
            <!-- 7. MỞ RỘNG SANDBOX ĐỂ HỖ TRỢ FORM VÀ DOWNLOAD -->
            <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-downloads"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('code-editor');
        const previewFrame = document.getElementById('preview-frame');
        const runBtn = document.getElementById('run-btn');
        const themeBtn = document.getElementById('theme-btn');
        const workspace = document.getElementById('workspace');
        const editorPanel = document.getElementById('editor-panel');
        const dragBar = document.getElementById('drag-bar');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const copyBtn = document.getElementById('copy-btn');
        const autorunCb = document.getElementById('autorun-cb');
        const examplesSelect = document.getElementById('examples-select');
        const statusText = document.getElementById('status-text');

        // --- DỮ LIỆU KHO VÍ DỤ MẪU (EXAMPLES DATA) ---
        const examples = {
            html: `<!DOCTYPE html>\n<html>\n<head>\n  <title>Trang Web Của Tôi</title>\n</head>\n<body>\n  <h1>Xin chào thế giới!</h1>\n  <p>Đây là một đoạn văn bản mẫu chuẩn cấu trúc HTML5.</p>\n</body>\n</html>`,
            css: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  .box {\n    background-color: #3498db;\n    color: white;\n    padding: 20px;\n    border-radius: 8px;\n    text-align: center;\n    box-shadow: 0 4px 6px rgba(0,0,0,0.1);\n  }\n</style>\n</head>\n<body>\n  <div class="box">Hộp màu tùy chỉnh bằng CSS</div>\n</body>\n</html>`,
            flexbox: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  .container {\n    display: flex;\n    gap: 10px;\n    justify-content: space-around;\n    background: #eee; padding: 10px;\n  }\n  .item { background: #2ecc71; color: white; padding: 20px; flex: 1; text-align: center; }\n</style>\n</head>\n<body>\n  <div class="container">\n    <div class="item">Cột 1</div>\n    <div class="item">Cột 2</div>\n    <div class="item">Cột 3</div>\n  </div>\n</body>\n</html>`,
            canvas: `<!DOCTYPE html>\n<html>\n<body>\n  <canvas id="myCanvas" width="200" height="200" style="border:1px solid #ccc;"></canvas>\n  <script>\n    const c = document.getElementById("myCanvas");\n    const ctx = c.getContext("2d");\n    ctx.fillStyle = "#e74c3c";\n    ctx.fillRect(20, 20, 150, 100);\n  <\/script>\n</body>\n</html>`,
            javascript: `<!DOCTYPE html>\n<html>\n<body>\n  <h1 id="headline">Hãy bấm nút bên dưới</h1>\n  <button onclick="changeText()">Bấm vào tôi</button>\n  <script>\n    function changeText() {\n      document.getElementById("headline").innerText = "JavaScript đang chạy thành công!";\n    }\n  <\/script>\n</body>\n</html>`
        };
        const defaultCode = examples.html;

        // --- KHỞI TẠO HỆ THỐNG ---
        editor.value = localStorage.getItem('apmaths_html_code') || defaultCode;
        const savedTheme = localStorage.getItem('apmaths_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        autorunCb.checked = localStorage.getItem('apmaths_autorun') !== 'false';

        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // --- HÀM DOWNLOAD BẢO TOÀN (TÁCH BIỆT CHO TRÌNH LẮNG NGHE CHUNG) ---
        function triggerDownload() {
            let filename = prompt("Nhập tên file muốn lưu:", "index.html");
            if (filename === null) return;
            filename = filename.trim() || "index.html";
            if (!filename.endsWith('.html')) filename += '.html';

            const blob = new Blob([editor.value], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        // --- 4. TÍNH NĂNG PHÍM TẮT CTRL + S CHUYÊN NGHIỆP ---
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
                e.preventDefault();
                triggerDownload();
            }
        });
        downloadBtn.addEventListener('click', triggerDownload);

        // --- HÀM CHẠY LIVE PREVIEW ---
        function runCode() {
            const code = editor.value;
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            previewFrame.onload = () => URL.revokeObjectURL(url);
            previewFrame.src = url;
        }

        // --- 1 & 5. AUTO SAVE ĐỘC LẬP & CẬP NHẬT TRẠNG THÁI GIAO DIỆN MƯỢT MÀ ---
        const saveStorage = debounce(() => {
            localStorage.setItem('apmaths_html_code', editor.value);
            statusText.textContent = "✔ Saved";
            statusText.className = "status-indicator status-saved";
        }, 300);

        const handleLivePreview = debounce(() => {
            if (autorunCb.checked) runCode();
        }, 500);

        editor.addEventListener('input', () => {
            statusText.textContent = "● Unsaved";
            statusText.className = "status-indicator status-unsaved";
            saveStorage();
            handleLivePreview();
        });

        autorunCb.addEventListener('change', (e) => {
            localStorage.setItem('apmaths_autorun', e.target.checked);
            if (e.target.checked) runCode();
        });

        // --- 2. NÚT RESET AN TOÀN ---
        resetBtn.addEventListener('click', () => {
            if (confirm("Bạn có chắc chắn muốn khôi phục mã nguồn về trạng thái mặc định ban đầu?")) {
                editor.value = defaultCode;
                localStorage.setItem('apmaths_html_code', defaultCode);
                runCode();
                examplesSelect.value = "";
            }
        });

        // --- 3. NÚT COPY SAO CHÉP NHANH ---
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(editor.value).then(() => {
                const oldText = copyBtn.textContent;
                copyBtn.textContent = "Copied! ✓";
                setTimeout(() => copyBtn.textContent = oldText, 2000);
            });
        });

        // --- XỬ LÝ SỰ KIỆN KHI CHỌN VÍ DỤ ---
        examplesSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (examples[val]) {
                editor.value = examples[val];
                localStorage.setItem('apmaths_html_code', examples[val]);
                runCode();
            }
        });

        // --- BỘ XỬ LÝ KÉO THẢ CHIA MÀN HÌNH (POINTER EVENTS) ---
        let isDragging = false;
        dragBar.addEventListener('pointerdown', (e) => {
            e.preventDefault(); isDragging = true;
            dragBar.classList.add('dragging'); previewFrame.style.pointerEvents = 'none';
            dragBar.setPointerCapture(e.pointerId);
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const rect = workspace.getBoundingClientRect();
            if (window.innerWidth > 900) {
                let pX = Math.max(rect.width * 0.15, Math.min(e.clientX - rect.left, rect.width * 0.85));
                editorPanel.style.width = `${(pX / rect.width) * 100}%`;
                document.getElementById('preview-panel').style.width = `${100 - (pX / rect.width) * 100}%`;
            } else {
                let pY = Math.max(rect.height * 0.15, Math.min(e.clientY - rect.top, rect.height * 0.85));
                editorPanel.style.height = `${(pY / rect.height) * 100}%`;
                document.getElementById('preview-panel').style.height = `${100 - (pY / rect.height) * 100}%`;
            }
        });

        const stopDragging = (e) => {
            if (isDragging) {
                isDragging = false; dragBar.classList.remove('dragging');
                previewFrame.style.pointerEvents = 'auto';
                try { dragBar.releasePointerCapture(e.pointerId); } catch(err) {}
            }
        };
        document.addEventListener('pointerup', stopDragging);
        document.addEventListener('pointercancel', stopDragging);

        // ĐỔI THEME & LOAD TRANG BAN ĐẦU
        themeBtn.addEventListener('click', () => {
            const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('apmaths_theme', newTheme);
        });
        window.addEventListener('load', runCode);
    </script>
</body>
</html>
