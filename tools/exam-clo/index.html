<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm thi CLO</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Bắt đầu Container chính gom toàn bộ trang web -->
    <div class="container">
        <h1>CHẤM THI CLO</h1>
        
        <!-- Khối chứa 2 card nạp file -->
        <div class="upload-grid">
            <div class="card">
                <h3>File UnT</h3>
                <input type="file" id="untFile" accept=".xlsx,.xls">
            </div>
            
            <div class="card">
                <h3>File Đáp án + CLO</h3>
                <input type="file" id="answerFile" accept=".xlsx,.xls">
                <p>
                    <a href="https://drive.google.com/drive/folders/1hNHQZvQrZ_qdh298rmvVCmSOTkexID-6?usp=sharing"
                       target="_blank"
                       rel="noopener noreferrer">
                        Xem và tải file đáp án mẫu
                    </a>
                </p>
            </div>
        </div>
        
        <!-- Nút xử lý chính -->
        <button id="btnProcess">Đọc dữ liệu và chấm bài</button>
        
        <hr>
        
        <!-- Nơi hiển thị kết quả chấm bài -->
        <div id="result"></div>

        <!-- ĐƯA VÀO TRONG: Các nút xuất dữ liệu sau khi chấm -->
        <div class="export-actions">
            <button id="btnExportMark" disabled>Xuất bảng điểm</button>
            <button id="btnExportDetail" disabled>Xuất bảng chi tiết</button>
        </div>
        
        <!-- ĐƯA VÀO TRONG: Footer nằm cuối cùng bên trong container để thẳng hàng tuyệt đối -->
        <footer class="footer">
            <div class="footer-links">
                <a href="about.html">About</a>
            </div>
            <div class="footer-info">
                <strong>EXAM-CLO</strong> • Phiên bản 1.0.0
            </div>
            <div class="footer-copyright">
                &copy; 2026 Phát triển bởi Phan Hoàng Nam.
            </div>
        </footer>
    </div> <!-- Kết thúc Container chính -->
    
    <!-- Entry Point duy nhất cho Native ES Module -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
