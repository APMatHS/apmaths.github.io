{% assign lang = page.lang | default: "vi" %}
{% assign t = site.data.languages[lang] %}

<!DOCTYPE html>
<html lang="{{ lang }}">

{% include head.html t=t %}

<body>

    {% include header.html t=t %}

    <nav aria-label="Main navigation">
        {% include menu.html t=t %}
    </nav>

    <main id="main-content" class="container">
        {{ content }}
    </main>

    {% include footer.html t=t %}

    <script src="/js/script.js"></script>

</body>

</html>
