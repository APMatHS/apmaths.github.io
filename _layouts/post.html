---
layout: default
---

<article class="post">

    <header class="post-header">

        <h1>{{ page.title }}</h1>

        <p class="meta">
            {{ page.date | date: "%d/%m/%Y" }}
        </p>

        {% if page.tags.size > 0 %}

        <div class="blog-tags">

            <strong>Tags:</strong>

            {% for tag in page.tags %}

                <a href="{{ '/tags' | relative_url }}#{{ tag }}">
                    {{ tag }}
                </a>{% unless forloop.last %} · {% endunless %}

            {% endfor %}

        </div>

        {% endif %}

    </header>

    <section class="post-content">

        {{ content }}

    </section>

</article>
